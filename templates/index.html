<!doctype html>
<html lang="zh-CN" data-bs-theme="dark">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Whisper-HY Web UI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="container py-4 px-4">

    <!-- 顶栏 -->
    <div class="d-flex align-items-center justify-content-between pb-3 mb-4">
        <div class="d-flex align-items-center gap-3">
            <i class="bi bi-translate fs-2 text-primary"></i>
            <span class="fs-4 main-title">Whisper-HY 本地翻译工具</span>
        </div>
        <div class="d-flex gap-2">
            <button class="btn btn-sm btn-outline-info" data-bs-toggle="modal" data-bs-target="#langModal">
                <i class="bi bi-globe me-1"></i>语言 &amp; 识别
            </button>
            <button class="btn btn-sm btn-outline-warning" data-bs-toggle="modal" data-bs-target="#termModal">
                <i class="bi bi-list-check me-1"></i>术语表
            </button>
            <button class="btn btn-sm btn-outline-secondary" data-bs-toggle="modal" data-bs-target="#promptModal">
                <i class="bi bi-chat-square-text me-1"></i>Prompt
            </button>
        </div>
    </div>

    <div class="row g-4">
        <!-- 左栏：控制 -->
        <div class="col-lg-5">
            <div class="d-flex flex-column gap-4">
                <!-- 模型路径 -->
                <div class="card">
                    <div class="card-header fw-semibold"><i class="bi bi-folder2-open me-2"></i>模型路径</div>
                    <div class="card-body">
                        <div class="mb-2">
                            <label class="form-label small mb-1">Whisper 模型</label>
                            <div class="input-group input-group-sm">
                                <input type="text" class="form-control" id="whisperPath" readonly placeholder="选择文件夹">
                                <button class="btn btn-outline-secondary" onclick="browsePath('whisperPath','dir')"><i class="bi bi-folder2-open"></i></button>
                            </div>
                        </div>
                        <div>
                            <label class="form-label small mb-1">混元翻译模型</label>
                            <div class="input-group input-group-sm">
                                <input type="text" class="form-control" id="hyPath" readonly placeholder="选择文件夹">
                                <button class="btn btn-outline-secondary" onclick="browsePath('hyPath','dir')"><i class="bi bi-folder2-open"></i></button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 任务 -->
                <div class="card">
                    <div class="card-header fw-semibold"><i class="bi bi-play-circle me-2"></i>任务流程</div>
                    <div class="card-body">
                        <div class="mb-3">
                            <label class="form-label small mb-1">1. 选择音频文件</label>
                            <div class="input-group input-group-sm">
                                <input type="text" class="form-control" id="audioFile" readonly placeholder="选择音频文件">
                                <button class="btn btn-outline-secondary" onclick="browsePath('audioFile','file')"><i class="bi bi-file-earmark-music"></i></button>
                            </div>
                        </div>
                        <div class="d-grid mb-3">
                            <button id="btn-asr" class="btn btn-sm btn-primary"><i class="bi bi-mic me-1"></i>开始语音识别</button>
                        </div>
                        <hr class="border-light opacity-25">
                        <div class="mb-2">
                            <label class="form-label small mb-1">或: 从已有 JSON 翻译</label>
                            <div class="input-group input-group-sm">
                                <input type="text" class="form-control" id="jsonFile" readonly placeholder="选择 JSON 文件（自动预览）">
                                <button class="btn btn-outline-secondary" onclick="browsePath('jsonFile','json')"><i class="bi bi-file-earmark-code"></i></button>
                            </div>
                        </div>
                        <div class="d-grid">
                            <button id="btn-translate-json" class="btn btn-sm btn-warning"><i class="bi bi-translate me-1"></i>翻译此 JSON</button>
                        </div>
                    </div>
                </div>

                 <!-- 快速翻译 -->
                <div class="card">
                    <div class="card-header fw-semibold"><i class="bi bi-send me-2"></i>快速翻译</div>
                    <div class="card-body">
                        <div>
                            <label class="form-label small mb-1">输入文本</label>
                            <textarea class="form-control form-control-sm mb-2" id="direct-input" rows="2"></textarea>
                        </div>
                        <div>
                            <label class="form-label small mb-1">翻译结果</label>
                            <textarea class="form-control form-control-sm" id="direct-output" rows="2" readonly></textarea>
                        </div>
                         <div class="d-grid mt-2">
                            <button id="btn-direct-translate" class="btn btn-sm btn-info">
                                <i class="bi bi-arrow-right-circle me-1"></i> 翻译
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 右栏：日志 + 结果 -->
        <div class="col-lg-7">
            <div class="d-flex flex-column gap-4">
                <!-- 日志 + 进度 -->
                <div class="card">
                    <div class="card-header fw-semibold"><i class="bi bi-terminal me-2"></i>运行日志</div>
                    <div class="card-body">
                        <div id="console" class="console mb-2">等待任务开始...</div>
                        <div class="progress" style="height:8px;" id="progress-wrap">
                            <div id="progress-bar" class="progress-bar progress-bar-striped progress-bar-animated" style="width:0%"></div>
                        </div>
                        <small id="progress-text" class="text-muted d-block mt-1"></small>
                    </div>
                </div>

                <!-- 原文 + 译文合并表格 -->
                <div class="card">
                    <div class="card-header d-flex justify-content-between align-items-center fw-semibold">
                        <span><i class="bi bi-table me-2"></i>结果预览</span>
                        <small class="text-muted fw-normal" id="table-stats"></small>
                    </div>
                    <div class="card-body p-0">
                        <div class="preview-table-wrap">
                            <table class="table table-sm table-dark table-striped table-hover mb-0 align-middle">
                                <thead class="sticky-top">
                                    <tr>
                                        <th style="width:40px">#</th>
                                        <th style="width:100px">时间轴</th>
                                        <th>原文</th>
                                        <th>译文</th>
                                    </tr>
                                </thead>
                                <tbody id="preview-tbody">
                                    <tr><td colspan="4" class="text-center text-muted py-5">暂无数据</td></tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- ===== 语言 & 识别设置 Modal ===== -->
<div class="modal fade" id="langModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title"><i class="bi bi-globe me-2"></i>语言 &amp; 识别设置</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="mb-3">
                    <label class="form-label">识别源语言</label>
                    <select class="form-select" id="setting-language">
                        <option value="pt">葡萄牙语 (pt)</option>
                        <option value="en">英语 (en)</option>
                        <option value="zh">中文 (zh)</option>
                        <option value="ja">日语 (ja)</option>
                        <option value="ko">韩语 (ko)</option>
                        <option value="es">西班牙语 (es)</option>
                        <option value="fr">法语 (fr)</option>
                        <option value="de">德语 (de)</option>
                        <option value="ru">俄语 (ru)</option>
                        <option value="ar">阿拉伯语 (ar)</option>
                    </select>
                    <div class="form-text">Whisper 将使用此语言进行语音识别。</div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-primary" onclick="saveLangSettings()">保存</button>
            </div>
        </div>
    </div>
</div>

<!-- ===== 术语表 Modal ===== -->
<div class="modal fade modal-xl" id="termModal" tabindex="-1">
    <div class="modal-dialog modal-xl modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title"><i class="bi bi-list-check me-2"></i>术语表管理</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <p class="text-muted small">术语表中的词汇会注入翻译 Prompt，此处设置“原文 → 译文”的映射，若保持原文不变则两列填写相同。</p>
                <div class="table-responsive" style="max-height: 60vh;">
                    <table class="table table-dark table-bordered table-sm" id="term-table">
                        <thead><tr><th>原文（source）</th><th>译文（target）</th><th style="width:50px"></th></tr></thead>
                        <tbody id="term-tbody"></tbody>
                    </table>
                </div>
                <button class="btn btn-sm btn-outline-success mt-2" onclick="addTermRow()"><i class="bi bi-plus-lg me-1"></i>添加术语</button>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-warning" onclick="saveTerminology()">保存术语表</button>
            </div>
        </div>
    </div>
</div>

<!-- ===== Prompt 编辑 Modal ===== -->
<div class="modal fade" id="promptModal" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title"><i class="bi bi-chat-square-text me-2"></i>Prompt 模板</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <p class="text-muted small">
                    可用变量：<code>{terms}</code>（术语表）、<code>{text}</code>（待翻译文本）。修改后立即生效于之后的翻译任务。
                </p>
                <textarea class="form-control" id="prompt-editor" rows="10" style="font-family: Consolas, monospace; font-size: .9rem;"></textarea>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-outline-danger btn-sm me-auto" onclick="resetPrompt()">恢复默认</button>
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-primary" onclick="savePrompt()">保存</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script src="/static/app.js"></script>
</body>
</html>
